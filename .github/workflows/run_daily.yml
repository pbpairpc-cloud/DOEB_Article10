name: Run DOEB Data Daily 11AM

on:
  schedule:
    - cron: "0 4 * * *"   # 11:00 ไทย (UTC+7)
  workflow_dispatch:      # เผื่อกดรันทดสอบเอง

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run data script
        run: python fetch_data.py
        continue-on-error: true

      - name: Upload CSV output
        uses: actions/upload-artifact@v4
        with:
          name: daily-csv
          path: output/

    - name: Check API connectivity
      run: |
      python -c "import requests; requests.get('https://data.doeb.go.th', timeout=10)" || echo "API unavailable"
